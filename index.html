<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="J16U Ventures countdown page." />
  <title>J16U Ventures</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page" aria-label="J16U Ventures countdown page">
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <header class="brand" aria-label="Site title">J16U Ventures</header>

    <section class="timer-wrap" aria-label="Countdown to 28 August 2026">
      <div id="countdown" class="timer" aria-live="polite">
        <span id="days">000</span><span class="colon">:</span><span id="hours">00</span><span class="colon">:</span><span id="minutes">00</span><span class="colon">:</span><span id="seconds">00</span><span class="colon">:</span><span id="milliseconds">000</span>
      </div>
      <div class="sr-only" id="countdown-label">Days, hours, minutes, seconds, milliseconds until 28 August 2026.</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
